{% extends "base.html" %}

{% block title %}Nova Compra{% endblock %}

{% block content %}
<div>
    <form class="formulario" action="{{ url_for('compras.compras') }}" method="POST">

        <p>
            <label for="fornecedor_id">Participante:</label>
            <select name="fornecedor_id" id="fornecedor_id" required>
                <option value="">Selecione</option>
                {% for p in participantes %}
                    <option value="{{ p.id }}">{{ p.nome }}</option>
                {% endfor %}
            </select>
        </p>

        <p>
            <label for="estoque_id">Produto:</label>
            <select name="estoque_id" id="estoque_id" required>
                <option value="">Selecione</option>
                {% for produto in produtos %}
                    <option value="{{ produto.id }}">{{ produto.nome_produto }} — {{ produto.tamanho }}</option>
                {% endfor %}
            </select>
        </p>

        <p>
            <label for="qntcom">Quantidade:</label>
            <input type="number" name="quantidade" id="qntcom" min="1" required>
        </p>

        <p>
            <label for="parcelas">Parcelas:</label>
            <input type="number" name="parcelas" id="parcelas" min="1" value="1" required>
        </p>

        <p>
            <input type="submit" value="Registrar Compra">
        </p>

    </form>
</div>
{% endblock %}
